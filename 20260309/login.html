<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
            <!-- 선택자는 id선택자 태그(h1,input,div)선택자-->
    <style>
        input {
            background-color: aqua;
            width: 100%;
            font-size: 30px;
        }
        .mydiv {
            border: 10px solid blue;/*테두리*/
            padding: 10px;/*안쪽 여백*/
        }
        button {    
            color: white;
            background-color: rgb(255, 100, 100);
            padding: 2rem;
            margin: 1rem;
            border : none;
            cursor: pointer;
        }
        button:hover {
            background-color: rgb(255, 70, 70);
        }
    </style>
</head>
<body>
    <div class="mydiv">   
        <label for="aa">id</label>
        <input type="text" id="aa" name="">
    </div>
    <div>   
        <label for="bb">password</label>
        <input type="password" id="bb" name="">
    </div>
    <button>로그인</button>
</body>
</html>
